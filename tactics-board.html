<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>戦術ボード — 日本 vs ブラジル (W杯 R32)</title>
<style>
  :root{
    --bg:#0e1117; --panel:#161b22; --ink:#e6edf3; --muted:#8b949e;
    --line:#30363d; --accent:#2f81f7;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,system-ui,sans-serif;
    -webkit-text-size-adjust:100%;}
  header{padding:8px 10px;border-bottom:1px solid var(--line);background:var(--panel);
    position:sticky;top:0;z-index:8}
  h1{font-size:14px;margin:0 0 4px;line-height:1.3}
  .sub{font-size:11px;color:var(--muted);margin-bottom:8px;line-height:1.4}
  .selrow{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:6px}
  .toolbar{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
  .group{display:flex;align-items:center;gap:5px;padding:5px 7px;border:1px solid var(--line);
    border-radius:9px;background:#0d1117}
  .group label{font-size:10px;color:var(--muted)}
  button,select{background:#21262d;color:var(--ink);border:1px solid var(--line);
    border-radius:8px;padding:8px 11px;font-size:13px;cursor:pointer;min-height:40px;
    -webkit-tap-highlight-color:transparent;touch-action:manipulation}
  button:active{transform:scale(0.96)}
  button:hover{border-color:var(--accent)}
  button.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:bold}
  select{padding:8px 6px;font-weight:bold}
  input[type=range]{width:84px;height:30px}
  .swatch{width:24px;height:24px;border-radius:50%;border:2px solid #fff;cursor:pointer;opacity:.45}
  .swatch.active{opacity:1;outline:3px solid var(--accent);outline-offset:1px}
  .wrap{width:100%;text-align:center}
  svg#board{display:block;width:100%;height:auto;max-width:760px;margin:0 auto;background:var(--bg)}
  .hint{font-size:11px;color:var(--muted);padding:8px 12px;line-height:1.5}
  .pill{font-size:10px;padding:2px 6px;border-radius:10px;background:#21262d;color:var(--muted)}
  #more-btn{display:none}

  @media(max-width:760px){
    h1{font-size:13px;margin-bottom:2px}
    .sub{display:none}
    header{padding:6px 9px}
    button,select{min-height:44px;font-size:14px;padding:9px 11px}
    .group{padding:5px 6px;gap:6px}
    .swatch{width:30px;height:30px}
    svg#board{max-width:100%}
    .hint{display:none}
    /* 操作ツールを下部固定バーに */
    #controls{position:fixed;left:0;right:0;bottom:0;z-index:20;background:var(--panel);
      border-top:1px solid var(--line);padding:8px 8px calc(8px + env(safe-area-inset-bottom));
      gap:6px;box-shadow:0 -4px 16px rgba(0,0,0,.5);max-height:48vh;overflow-y:auto;
      justify-content:center}
    #controls .secondary{display:none;width:100%;justify-content:center}
    body.show-more #controls .secondary{display:flex}
    #more-btn{display:inline-flex}
    body{padding-bottom:150px}
  }
</style>
</head>
<body>
<header>
  <h1>⚽ 戦術ボード — 日本 vs ブラジル / W杯2026 R32</h1>
  <div class="sub">NRG Stadium, Houston ・ 現地 6/29(月) 13:00（日本時間 6/30 早朝） — 予想スタメン＆動きを描こう</div>
  <div class="selrow">
    <div class="group"><label>日本</label><select id="fm-japan"></select></div>
    <div class="group"><label>ブラジル</label><select id="fm-brazil"></select></div>
    <button id="toggle-both">両チーム</button>
  </div>
  <div class="toolbar" id="controls">
    <div class="group">
      <button data-tool="select" class="tool active">✋ 動かす</button>
      <button data-tool="arrow" class="tool">↗ 矢印</button>
      <button data-tool="line" class="tool">／ 直線</button>
      <button data-tool="pen" class="tool">✎ ペン</button>
      <button id="more-btn">⋯ 詳細</button>
    </div>
    <div class="group">
      <span class="swatch active" data-color="#ef4444" style="background:#ef4444"></span>
      <span class="swatch" data-color="#fbbf24" style="background:#fbbf24"></span>
      <span class="swatch" data-color="#22d3ee" style="background:#22d3ee"></span>
      <span class="swatch" data-color="#a3e635" style="background:#a3e635"></span>
      <span class="swatch" data-color="#ffffff" style="background:#ffffff"></span>
      <input type="range" id="lw" min="2" max="12" value="5" title="線の太さ">
      <button id="undo">↩ 戻す</button>
      <button id="clear">描画クリア</button>
    </div>
    <div class="group secondary">
      <button id="toggle-romaji">英字</button>
      <button id="orient">たて／よこ</button>
      <button id="reset">配置リセット</button>
      <button id="ai">おまかせ配置</button>
    </div>
    <div class="group secondary">
      <button id="export-png">🖼 画像で保存</button>
      <button id="share-x" style="background:#000;border-color:#000;color:#fff;font-weight:bold">𝕏 に投稿</button>
    </div>
  </div>
</header>

<div class="wrap">
  <svg id="board" viewBox="0 0 1400 780" xmlns="http://www.w3.org/2000/svg">
    <rect id="bg" x="0" y="0" width="1400" height="780" fill="#0e1117"/>
    <g id="pitch"></g>
    <g id="tokens"></g>
    <g id="drawings" pointer-events="none"></g>
  </svg>
</div>
<div class="hint">
  控え選手をピッチへドラッグすると最寄りの選手と<b>交代</b>（常に11人）。ピッチの選手を控えエリアへ出すと交代。「動かす」でトークン移動、矢印／直線／ペンで動きを描けます。内容は自動保存。
  <span class="pill">背番号：日本=確定 / ブラジル=未割当(?)</span>
</div>

<script>

        {number:null,name:"ネイマール", romaji:"Neymar", club:"サントス", pos:"FW", role:"AM/LW"},
        {number:null,name:"ハフィーニャ", romaji:"Raphinha", club:"バルセロナ", pos:"FW", role:"RW/LW"},

    }
  }
};

const DEFAULT_XI = {
  japan:[0,5,7,10,3,11,14,13,17,15,22],
  brazil:[0,11,10,7,3,13,12,16,23,21,25]
};

const FORMATIONS = {
  "4-3-3":[4,3,3], "4-2-3-1":[4,2,3,1], "4-4-2":[4,4,2], "4-3-2-1":[4,3,2,1],
  "4-1-4-1":[4,1,4,1], "3-4-2-1":[3,4,2,1], "3-4-3":[3,4,3], "3-5-2":[3,5,2],
  "5-4-1":[5,4,1], "5-3-2":[5,3,2]
};

const teamKeys=["japan","brazil"];
const ROSTER={};
teamKeys.forEach(tk=>{ ROSTER[tk]=DATA.teams[tk].players.map((p,i)=>({...p,id:tk+"-"+i,team:tk})); });
const byId={};
teamKeys.forEach(tk=>ROSTER[tk].forEach(p=>byId[p.id]=p));
const ROLE_COLORS={GK:"#f59e0b",DF:"#38bdf8",MF:"#34d399",FW:"#f472b6"};
function cat(p){return p.pos==="GK"?"GK":p.pos==="DF"?"DF":p.pos==="MF"?"MF":"FW";}

/* =========================================================================
   レイアウト（向き × 表示モードで切替）
   solo = 日本のみ → 縦のときハーフコート
   ========================================================================= */
function isSmall(){ const w=window.innerWidth||800,h=window.innerHeight||600; return w<760||w<h; }
function effOrient(){
  if(S && S.orientation && S.orientation!=="auto") return S.orientation;
  return isSmall() ? "portrait" : "landscape";
}
function getLayout(o,solo){
  if(o==="portrait"){
    if(solo){ // ハーフコート・日本のみ
      return {portrait:true,half:true,alongMax:0.5,
        VBW:430,VBH:985,PX:34,PY:46,PW:362,PH:690,R:23,benchR:18};
    }
    return {portrait:true,half:false,alongMax:1,
      VBW:430,VBH:1090,PX:34,PY:248,PW:362,PH:560,R:21,benchR:18};
  }
  return {portrait:false,half:false,alongMax:1,
    VBW:1400,VBH:780,PX:215,PY:70,PW:970,PH:640,R:17,benchR:16};
}
let L=getLayout("landscape",false);

/* 座標：選手は (a=自陣→敵陣 0..1, c=横 0..1) で保持。向きでSVGに写像 */
function ptToSvg(a,c){
  const af=Math.max(0,Math.min(1, a/L.alongMax));
  if(L.portrait) return [L.PX + c*L.PW, L.PY + (1-af)*L.PH];
  return [L.PX + af*L.PW, L.PY + c*L.PH];
}
function svgToPt(x,y){
  let af,c;
  if(L.portrait){ c=(x-L.PX)/L.PW; af=1-(y-L.PY)/L.PH; }
  else { af=(x-L.PX)/L.PW; c=(y-L.PY)/L.PH; }
  const a=Math.max(0,Math.min(1, af*L.alongMax));
  return [a, Math.max(0,Math.min(1,c))];
}
function inPitch(x,y){ return x>=L.PX&&x<=L.PX+L.PW&&y>=L.PY&&y<=L.PY+L.PH; }
function zoneTeam(x,y){
  if(L.portrait){
    if(L.half) return y>L.PY+L.PH ? "japan" : null;
    if(y>L.PY+L.PH) return "japan"; if(y<L.PY) return "brazil"; return null;
  }
  if(x<L.PX) return "japan"; if(x>L.PX+L.PW) return "brazil"; return null;
}

/* =========================================================================
   状態
   ========================================================================= */
const LS_KEY="tactics-jpn-bra-v3";
let S=null;

function defaultState(){
  const st={
    showBoth: !isSmall(),   // スマホは日本のみ（ハーフコート）を既定に
    romaji:false, orientation:"auto", tool:"select",
    color:"#ef4444", width:5,
    teams:{ japan:{formation:DATA.teams.japan.defaultFormation},
            brazil:{formation:DATA.teams.brazil.defaultFormation} },
    players:{}, drawings:[]
  };
  teamKeys.forEach(tk=>{
    const starters=new Set(DEFAULT_XI[tk].map(i=>tk+"-"+i));
    ROSTER[tk].forEach(p=>{ st.players[p.id]={onPitch:starters.has(p.id),px:0.5,py:0.5}; });
  });
  return st;
}

function genSlots(formationKey){
  const lines=FORMATIONS[formationKey];
  const slots=[{c:"GK",dx:0.05,dy:0.5}];
  const n=lines.length, start=0.17, end=0.47;
  lines.forEach((k,i)=>{
    const dx = n>1 ? start+i*(end-start)/(n-1) : (start+end)/2;
    const c = i===0?"DF":(i===n-1?"FW":"MF");
    for(let j=0;j<k;j++){ slots.push({c, dx, dy:(j+1)/(k+1)}); }
  });
  return slots;
}
function applyFormation(tk){
  const slots=genSlots(S.teams[tk].formation);
  const starters=ROSTER[tk].filter(p=>S.players[p.id].onPitch);
  const pools={GK:[],DF:[],MF:[],FW:[]};
  starters.forEach(p=>pools[cat(p)].push(p));
  const fb=["DF","MF","FW","GK"];
  slots.forEach(slot=>{
    let p=pools[slot.c].shift();
    if(!p){ for(const f of fb){ if(pools[f].length){p=pools[f].shift();break;} } }
    if(!p) return;
    S.players[p.id].px = tk==="japan" ? slot.dx*0.5 : 1-slot.dx*0.5;
    S.players[p.id].py = slot.dy;
  });
}

/* ベンチ配置 */
const benchPos={};
function layoutBench(){
  teamKeys.forEach(tk=>{
    if(tk==="brazil" && !S.showBoth) return;
    const bench=ROSTER[tk].filter(p=>!S.players[p.id].onPitch);
    if(L.portrait){
      const perRow=5, margin=42, step=(L.VBW-2*margin)/(perRow-1), rowStep=L.half?58:62;
      const startY = (L.half||tk==="japan") ? L.PY+L.PH+(L.half?34:46) : 44;
      bench.forEach((p,i)=>{
        const col=i%perRow, row=Math.floor(i/perRow);
        benchPos[p.id]={x:margin+col*step, y:startY+row*rowStep};
      });
    } else {
      const cols = tk==="japan" ? [62,150] : [L.VBW-150,L.VBW-62];
      const startY=L.PY+26, rowStep=(L.PH-50)/7;
      bench.forEach((p,i)=>{
        const col=i%2, row=Math.floor(i/2);
        benchPos[p.id]={x:cols[col], y:startY+row*rowStep};
      });
    }
  });
}
function tokenXY(p){
  const st=S.players[p.id];
  if(st.onPitch) return ptToSvg(st.px,st.py);
  const b=benchPos[p.id]||{x:60,y:100};
  return [b.x,b.y];
}

/* =========================================================================
   描画
   ========================================================================= */
const elPitch=document.getElementById("pitch");
const elTokens=document.getElementById("tokens");
const elDraw=document.getElementById("drawings");
const svg=document.getElementById("board");
const elBg=document.getElementById("bg");

function drawPitch(){
  const x=L.PX,y=L.PY,w=L.PW,h=L.PH, lw=L.portrait?2.5:3;
  let s=`<rect x="${x}" y="${y}" width="${w}" height="${h}" fill="#1f7a3d" stroke="#dfe9df" stroke-width="${lw}"/>`;
  if(L.portrait && L.half){
    const sh=h/8;
    for(let i=0;i<8;i++) if(i%2===0) s+=`<rect x="${x}" y="${y+i*sh}" width="${w}" height="${sh}" fill="#1c6f37" opacity="0.5"/>`;
    const cx=x+w/2, arcR=w*0.2;
    s+=`<circle cx="${cx}" cy="${y}" r="3.5" fill="#dfe9df"/>`;
    s+=`<path d="M ${cx-arcR} ${y} A ${arcR} ${arcR} 0 0 0 ${cx+arcR} ${y}" fill="none" stroke="#dfe9df" stroke-width="${lw}"/>`;
    const boxW=w*0.62,boxH=h*0.135,boxX=x+(w-boxW)/2;
    const gW=w*0.32,gH=h*0.05,gX=x+(w-gW)/2;
    s+=`<rect x="${boxX}" y="${y+h-boxH}" width="${boxW}" height="${boxH}" fill="none" stroke="#dfe9df" stroke-width="${lw}"/>`;
    s+=`<rect x="${gX}" y="${y+h-gH}" width="${gW}" height="${gH}" fill="none" stroke="#dfe9df" stroke-width="${lw}"/>`;
    s+=`<circle cx="${cx}" cy="${y+h-boxH*0.74}" r="3" fill="#dfe9df"/>`;
    s+=`<text x="${cx}" y="${y+22}" fill="#dfe9df" font-size="12" text-anchor="middle" opacity="0.85">ハーフウェイライン</text>`;
    s+=`<text x="${cx}" y="${y+h*0.5}" fill="#bfe3cf" font-size="14" text-anchor="middle" opacity="0.5">日本 ↑ 攻撃方向</text>`;
    s+=`<text x="${L.VBW/2}" y="${y+h+26}" fill="#1f4fd8" font-size="15" font-weight="bold" text-anchor="middle">日本 ベンチ（タップ＆ドラッグで交代）</text>`;
  } else if(L.portrait){
    const sh=h/10;
    for(let i=0;i<10;i++) if(i%2===0) s+=`<rect x="${x}" y="${y+i*sh}" width="${w}" height="${sh}" fill="#1c6f37" opacity="0.5"/>`;
    const cx=x+w/2, cy=y+h/2;
    s+=`<line x1="${x}" y1="${cy}" x2="${x+w}" y2="${cy}" stroke="#dfe9df" stroke-width="${lw}"/>`;
    s+=`<circle cx="${cx}" cy="${cy}" r="${w*0.2}" fill="none" stroke="#dfe9df" stroke-width="${lw}"/>`;
    s+=`<circle cx="${cx}" cy="${cy}" r="4" fill="#dfe9df"/>`;
    const boxW=w*0.6,boxH=h*0.15,boxX=x+(w-boxW)/2, gW=w*0.3,gH=h*0.058,gX=x+(w-gW)/2;
    s+=`<rect x="${boxX}" y="${y}" width="${boxW}" height="${boxH}" fill="none" stroke="#dfe9df" stroke-width="${lw}"/>`;
    s+=`<rect x="${gX}" y="${y}" width="${gW}" height="${gH}" fill="none" stroke="#dfe9df" stroke-width="${lw}"/>`;
    s+=`<rect x="${boxX}" y="${y+h-boxH}" width="${boxW}" height="${boxH}" fill="none" stroke="#dfe9df" stroke-width="${lw}"/>`;
    s+=`<rect x="${gX}" y="${y+h-gH}" width="${gW}" height="${gH}" fill="none" stroke="#dfe9df" stroke-width="${lw}"/>`;
    s+=`<text x="${L.VBW/2}" y="28" fill="#f7d11e" font-size="15" font-weight="bold" text-anchor="middle">ブラジル ベンチ ↓</text>`;
    s+=`<text x="${L.VBW/2}" y="${y+h+34}" fill="#1f4fd8" font-size="15" font-weight="bold" text-anchor="middle">日本 ベンチ ↑</text>`;
  } else {
    const sw=w/10;
    for(let i=0;i<10;i++) if(i%2===0) s+=`<rect x="${x+i*sw}" y="${y}" width="${sw}" height="${h}" fill="#1c6f37" opacity="0.5"/>`;
    const midx=x+w/2, cy=y+h/2;
    s+=`<line x1="${midx}" y1="${y}" x2="${midx}" y2="${y+h}" stroke="#dfe9df" stroke-width="${lw}"/>`;
    s+=`<circle cx="${midx}" cy="${cy}" r="${h*0.10}" fill="none" stroke="#dfe9df" stroke-width="${lw}"/>`;
    s+=`<circle cx="${midx}" cy="${cy}" r="4" fill="#dfe9df"/>`;
    const boxH=h*0.55, boxW=w*0.16, gW=w*0.055, gH=h*0.22;
    s+=`<rect x="${x}" y="${cy-boxH/2}" width="${boxW}" height="${boxH}" fill="none" stroke="#dfe9df" stroke-width="${lw}"/>`;
    s+=`<rect x="${x}" y="${cy-gH/2}" width="${gW}" height="${gH}" fill="none" stroke="#dfe9df" stroke-width="${lw}"/>`;
    s+=`<rect x="${x+w-boxW}" y="${cy-boxH/2}" width="${boxW}" height="${boxH}" fill="none" stroke="#dfe9df" stroke-width="${lw}"/>`;
    s+=`<rect x="${x+w-gW}" y="${cy-gH/2}" width="${gW}" height="${gH}" fill="none" stroke="#dfe9df" stroke-width="${lw}"/>`;
    s+=`<text x="${L.PX/2}" y="${L.PY-14}" fill="#1f4fd8" font-size="16" font-weight="bold" text-anchor="middle">日本 ベンチ</text>`;
    if(S.showBoth) s+=`<text x="${L.PX+L.PW+(L.VBW-L.PX-L.PW)/2}" y="${L.PY-14}" fill="#f7d11e" font-size="16" font-weight="bold" text-anchor="middle">ブラジル ベンチ</text>`;
    s+=`<text x="${x+w*0.25}" y="${y+h+24}" fill="#1f4fd8" font-size="13" text-anchor="middle">日本 → 攻撃方向</text>`;
    if(S.showBoth) s+=`<text x="${x+w*0.75}" y="${y+h+24}" fill="#f7d11e" font-size="13" text-anchor="middle">← ブラジル 攻撃方向</text>`;
  }
  elPitch.innerHTML=s;
}

function esc(t){return String(t).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function trunc(t,n){t=String(t);return t.length>n?t.slice(0,n)+"…":t;}
function initials(rom){const w=String(rom).split(/[ (]/)[0];return w.slice(0,2).toUpperCase();}

function tokenSVG(p){
  const tcol=DATA.teams[p.team].color;
  const txt = p.team==="japan" ? "#fff" : "#222";
  const onP=S.players[p.id].onPitch;
  const [x,y]=tokenXY(p);
  const r = onP ? L.R : L.benchR;
  const center = p.number!=null ? p.number : initials(p.romaji);
  const fs = (typeof center==="string"&&String(center).length>1)? r*0.7 : r*0.85;
  const label = trunc(S.romaji?p.romaji:p.name, L.portrait?6:9);
  const role=cat(p);
  const lw=r*4;
  return `<g class="tok" data-id="${p.id}" data-team="${p.team}" transform="translate(${x.toFixed(1)},${y.toFixed(1)})">
    <title>${esc(p.name)} / ${esc(p.romaji)}${p.number!=null?" #"+p.number:""}\n${esc(p.club)} (${esc(role)})</title>
    <circle r="${r+3}" fill="${ROLE_COLORS[role]}"/>
    <circle r="${r}" fill="${tcol}" stroke="#0b0e14" stroke-width="1.5"/>
    <text y="${(fs*0.35).toFixed(1)}" text-anchor="middle" font-size="${fs.toFixed(1)}" font-weight="bold" fill="${txt}">${esc(center)}</text>
    <rect x="${(-lw/2).toFixed(1)}" y="${r+3}" width="${lw.toFixed(1)}" height="15" rx="3" fill="#0b0e14" opacity="0.8"/>
    <text y="${r+14}" text-anchor="middle" font-size="10.5" fill="#fff">${esc(label)}</text>
  </g>`;
}
function renderTokens(){
  layoutBench();
  let s="";
  teamKeys.forEach(tk=>{
    if(tk==="brazil" && !S.showBoth) return;
    ROSTER[tk].forEach(p=>{ s+=tokenSVG(p); });
  });
  elTokens.innerHTML=s;
}

function arrowHead(x1,y1,x2,y2,size){
  const ang=Math.atan2(y2-y1,x2-x1);
  const a1=ang+Math.PI*0.85, a2=ang-Math.PI*0.85;
  return `${x2.toFixed(1)},${y2.toFixed(1)} ${(x2+size*Math.cos(a1)).toFixed(1)},${(y2+size*Math.sin(a1)).toFixed(1)} ${(x2+size*Math.cos(a2)).toFixed(1)},${(y2+size*Math.sin(a2)).toFixed(1)}`;
}
function renderDrawings(extra){
  let s="";
  const all = extra ? S.drawings.concat([extra]) : S.drawings;
  all.forEach(d=>{
    if(d.type==="pen"){
      const pts=d.pts.map(pt=>{const a=ptToSvg(pt[0],pt[1]);return a[0].toFixed(1)+","+a[1].toFixed(1);}).join(" ");
      s+=`<polyline points="${pts}" fill="none" stroke="${d.color}" stroke-width="${d.width}" stroke-linecap="round" stroke-linejoin="round"/>`;
    } else {
      const A=ptToSvg(d.a1,d.c1), B=ptToSvg(d.a2,d.c2);
      s+=`<line x1="${A[0].toFixed(1)}" y1="${A[1].toFixed(1)}" x2="${B[0].toFixed(1)}" y2="${B[1].toFixed(1)}" stroke="${d.color}" stroke-width="${d.width}" stroke-linecap="round"/>`;
      if(d.type==="arrow") s+=`<polygon points="${arrowHead(A[0],A[1],B[0],B[1],12+d.width)}" fill="${d.color}"/>`;
    }
  });
  elDraw.innerHTML=s;
}

function render(){
  L=getLayout(effOrient(), !S.showBoth);
  svg.setAttribute("viewBox",`0 0 ${L.VBW} ${L.VBH}`);
  elBg.setAttribute("width",L.VBW); elBg.setAttribute("height",L.VBH);
  drawPitch();
  renderTokens();
  renderDrawings();
  elTokens.style.pointerEvents = (S.tool==="select")?"auto":"none";
  svg.style.touchAction = (S.tool==="select")?"auto":"none";
  const ob=document.getElementById("orient");
  if(ob) ob.textContent = effOrient()==="portrait" ? "よこにする" : "たてにする";
  save();
}

/* =========================================================================
   交代ロジック（常に11人維持）
   ========================================================================= */
function nearestOnPitch(tk,x,y,excludeId){
  let best=null,bd=Infinity;
  ROSTER[tk].forEach(p=>{
    if(!S.players[p.id].onPitch||p.id===excludeId) return;
    const a=ptToSvg(S.players[p.id].px,S.players[p.id].py);
    const d=(a[0]-x)**2+(a[1]-y)**2; if(d<bd){bd=d;best=p;}
  });
  return best;
}
function nearestBench(tk,x,y){
  let best=null,bd=Infinity;
  ROSTER[tk].forEach(p=>{
    if(S.players[p.id].onPitch) return;
    const b=benchPos[p.id]; if(!b) return;
    const d=(b.x-x)**2+(b.y-y)**2; if(d<bd){bd=d;best=p;}
  });
  return best;
}

/* =========================================================================
   ポインタ操作
   ========================================================================= */
let drag=null, drawing=null;
function svgPoint(e){
  const pt=svg.createSVGPoint(); pt.x=e.clientX; pt.y=e.clientY;
  const p=pt.matrixTransform(svg.getScreenCTM().inverse());
  return [p.x,p.y];
}
svg.addEventListener("pointerdown",e=>{
  const [x,y]=svgPoint(e);
  if(S.tool==="select"){
    const g=e.target.closest(".tok");
    if(g){
      const id=g.getAttribute("data-id"), p=byId[id];
      if(p.team==="brazil"&&!S.showBoth) return;
      drag={id,team:p.team,fromPitch:S.players[id].onPitch,el:g};
      svg.setPointerCapture(e.pointerId);
    }
  } else {
    if(!inPitch(x,y)) return;
    const pt=svgToPt(x,y);
    if(S.tool==="pen") drawing={type:"pen",color:S.color,width:S.width,pts:[pt]};
    else drawing={type:S.tool,color:S.color,width:S.width,a1:pt[0],c1:pt[1],a2:pt[0],c2:pt[1]};
    svg.setPointerCapture(e.pointerId);
  }
});
svg.addEventListener("pointermove",e=>{
  const [x,y]=svgPoint(e);
  if(drag){
    drag.el.setAttribute("transform",`translate(${x.toFixed(1)},${y.toFixed(1)})`);
  } else if(drawing){
    const pt=svgToPt(x,y);
    if(drawing.type==="pen") drawing.pts.push(pt);
    else { drawing.a2=pt[0]; drawing.c2=pt[1]; }
    renderDrawings(drawing);
  }
});
svg.addEventListener("pointerup",e=>{
  const [x,y]=svgPoint(e);
  if(drag){
    const {id,team,fromPitch}=drag;
    const zt=zoneTeam(x,y);
    if(fromPitch){
      if(zt===team){
        const inP=nearestBench(team,x,y);
        if(inP){
          S.players[id].onPitch=false; S.players[inP.id].onPitch=true;
          S.players[inP.id].px=S.players[id].px; S.players[inP.id].py=S.players[id].py;
        }
      } else {
        const [a,c]=svgToPt(x,y);
        S.players[id].px=a; S.players[id].py=c;
      }
    } else {
      if(inPitch(x,y)){
        const out=nearestOnPitch(team,x,y,id);
        if(out){
          S.players[out.id].onPitch=false; S.players[id].onPitch=true;
          const [a,c]=svgToPt(x,y); S.players[id].px=a; S.players[id].py=c;
        }
      }
    }
    drag=null; render();
  } else if(drawing){
    if(drawing.type==="pen"){ if(drawing.pts.length>1) S.drawings.push(drawing); }
    else {
      const A=ptToSvg(drawing.a1,drawing.c1),B=ptToSvg(drawing.a2,drawing.c2);
      if(Math.hypot(B[0]-A[0],B[1]-A[1])>5) S.drawings.push(drawing);
    }
    drawing=null; render();
  }
});

/* =========================================================================
   保存 / 復元
   ========================================================================= */
function save(){ try{ localStorage.setItem(LS_KEY,JSON.stringify(S)); }catch(_){} }
function load(){
  try{
    const raw=localStorage.getItem(LS_KEY); if(!raw) return false;
    const o=JSON.parse(raw); if(!o||!o.players) return false;
    S=o;
    if(!Array.isArray(S.drawings)) S.drawings=[];
    if(!S.orientation) S.orientation="auto";
    if(typeof S.showBoth!=="boolean") S.showBoth=!isSmall();
    teamKeys.forEach(tk=>ROSTER[tk].forEach(p=>{ if(!S.players[p.id]) S.players[p.id]={onPitch:false,px:0.5,py:0.5}; }));
    return true;
  }catch(_){ return false; }
}

/* =========================================================================
   UI
   ========================================================================= */
function buildSelects(){
  teamKeys.forEach(tk=>{
    const sel=document.getElementById("fm-"+tk);
    sel.innerHTML=Object.keys(FORMATIONS).map(k=>`<option value="${k}">${k}</option>`).join("");
    sel.value=S.teams[tk].formation;
    sel.addEventListener("change",()=>{ S.teams[tk].formation=sel.value; applyFormation(tk); render(); });
  });
}
document.querySelectorAll(".tool").forEach(b=>b.addEventListener("click",()=>{
  S.tool=b.getAttribute("data-tool");
  document.querySelectorAll(".tool").forEach(x=>x.classList.toggle("active",x===b));
  render();
}));
document.querySelectorAll(".swatch").forEach(s=>s.addEventListener("click",()=>{
  S.color=s.getAttribute("data-color");
  document.querySelectorAll(".swatch").forEach(x=>x.classList.toggle("active",x===s));
}));
document.getElementById("lw").addEventListener("input",e=>{S.width=+e.target.value;});
document.getElementById("toggle-both").addEventListener("click",e=>{
  S.showBoth=!S.showBoth; render(); syncToolbar();
});
document.getElementById("toggle-romaji").addEventListener("click",e=>{
  S.romaji=!S.romaji; e.target.classList.toggle("active",S.romaji); render();
});
document.getElementById("orient").addEventListener("click",()=>{
  S.orientation = effOrient()==="portrait" ? "landscape" : "portrait"; render();
});
document.getElementById("more-btn").addEventListener("click",()=>{
  document.body.classList.toggle("show-more");
});
document.getElementById("undo").addEventListener("click",()=>{ S.drawings.pop(); render(); });
document.getElementById("clear").addEventListener("click",()=>{ S.drawings=[]; render(); });
document.getElementById("reset").addEventListener("click",()=>{
  if(!confirm("選択中フォーメーションのデフォルト配置に戻します（描画は残ります）。")) return;
  teamKeys.forEach(tk=>{
    const starters=new Set(DEFAULT_XI[tk].map(i=>tk+"-"+i));
    ROSTER[tk].forEach(p=>{ S.players[p.id].onPitch=starters.has(p.id); });
    S.teams[tk].formation=DATA.teams[tk].defaultFormation;
    document.getElementById("fm-"+tk).value=S.teams[tk].formation;
    applyFormation(tk);
  });
  render();
});
document.getElementById("ai").addEventListener("click",()=>{
  teamKeys.forEach(tk=>{
    const lines=FORMATIONS[S.teams[tk].formation];
    const need={GK:1,DF:lines[0],MF:lines.slice(1,-1).reduce((a,b)=>a+b,0),FW:lines[lines.length-1]};
    const chosen=new Set();
    ["GK","DF","MF","FW"].forEach(c=>{
      const cands=ROSTER[tk].filter(p=>cat(p)===c);
      for(let i=0;i<need[c]&&i<cands.length;i++) chosen.add(cands[i].id);
    });
    let arr=ROSTER[tk].filter(p=>chosen.has(p.id));
    ROSTER[tk].forEach(p=>{ if(arr.length<11&&!chosen.has(p.id)){chosen.add(p.id);arr.push(p);} });
    ROSTER[tk].forEach(p=>{ S.players[p.id].onPitch=chosen.has(p.id); });
    applyFormation(tk);
  });
  render();
  alert("おまかせ配置を入れました（各ポジションから機械的に選出。予想の当否は保証しません）。");
});

function buildPngBlob(sc){
  return new Promise((resolve,reject)=>{
    const clone=svg.cloneNode(true);
    clone.setAttribute("width",L.VBW); clone.setAttribute("height",L.VBH);
    clone.setAttribute("xmlns","http://www.w3.org/2000/svg");
    const str=new XMLSerializer().serializeToString(clone);
    const url="data:image/svg+xml;base64,"+btoa(unescape(encodeURIComponent(str)));
    const img=new Image();
    img.onload=()=>{
      const cv=document.createElement("canvas");
      cv.width=L.VBW*sc; cv.height=L.VBH*sc;
      const ctx=cv.getContext("2d");
      ctx.fillStyle="#0e1117"; ctx.fillRect(0,0,cv.width,cv.height);
      ctx.drawImage(img,0,0,cv.width,cv.height);
      cv.toBlob(b=> b?resolve(b):reject(new Error("toBlob failed")));
    };
    img.onerror=reject; img.src=url;
  });
}
function downloadBlob(b,name){
  const a=document.createElement("a"); a.href=URL.createObjectURL(b);
  a.download=name; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}
document.getElementById("export-png").addEventListener("click",()=>{
  buildPngBlob(2).then(b=>downloadBlob(b,"tactics-japan-brazil.png")).catch(()=>alert("画像の生成に失敗しました。"));
});

/* X（旧Twitter）に投稿：スマホは画像をそのまま共有、PC等は画像保存＋投稿画面 */
document.getElementById("share-x").addEventListener("click",async()=>{
  const fm=S.teams.japan.formation;
  const tag="#サッカー日本代表を応援";
  const shareText=`予想フォーメーション 日本 ${fm}（vs ブラジル / W杯R32）\n${tag}`;
  let blob=null;
  try{ blob=await buildPngBlob(2); }catch(_){ }
  if(blob){
    try{
      const file=new File([blob],"japan-formation.png",{type:"image/png"});
      if(navigator.canShare && navigator.canShare({files:[file]})){
        await navigator.share({files:[file], text:shareText});
        return;
      }
    }catch(err){ if(err && err.name==="AbortError") return; }
    downloadBlob(blob,"japan-formation.png");
  }
  const intentText=`予想フォーメーション 日本 ${fm}（vs ブラジル / W杯R32）`;
  const url="https://twitter.com/intent/tweet?text="+encodeURIComponent(intentText)
    +"&hashtags="+encodeURIComponent("サッカー日本代表を応援");
  window.open(url,"_blank","noopener");
  alert("画像を保存しました。Xの投稿画面が開くので、保存した画像を添付して投稿してください。\n（スマホでは画像をそのまま共有できます）");
});

function syncToolbar(){
  teamKeys.forEach(tk=>{ const sel=document.getElementById("fm-"+tk); if(sel) sel.value=S.teams[tk].formation; });
  const tb=document.getElementById("toggle-both");
  tb.classList.toggle("active",S.showBoth); tb.textContent=S.showBoth?"両チーム":"日本のみ";
  document.getElementById("toggle-romaji").classList.toggle("active",S.romaji);
  document.querySelectorAll(".tool").forEach(b=>b.classList.toggle("active",b.getAttribute("data-tool")===S.tool));
  document.querySelectorAll(".swatch").forEach(s=>s.classList.toggle("active",s.getAttribute("data-color")===S.color));
  document.getElementById("lw").value=S.width;
}

let rTimer=null, lastOrient=null;
window.addEventListener("resize",()=>{
  clearTimeout(rTimer);
  rTimer=setTimeout(()=>{ const o=effOrient(); if(o!==lastOrient){ lastOrient=o; render(); } },150);
});

function init(){
  if(!load()){ S=defaultState(); teamKeys.forEach(tk=>applyFormation(tk)); }
  lastOrient=effOrient();
  buildSelects(); syncToolbar(); render();
}
init();
</script>
